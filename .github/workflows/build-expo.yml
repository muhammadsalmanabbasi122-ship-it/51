name: Build Expo Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate mockup components stub
        run: |
          mkdir -p artifacts/mockup-sandbox/src/.generated
          cat > artifacts/mockup-sandbox/src/.generated/mockup-components.ts << 'EOF'
          type ModuleMap = Record<string, () => Promise<Record<string, unknown>>>;
          export const modules: ModuleMap = {

          };
          EOF

      - name: Typecheck
        run: pnpm typecheck

      - name: Prebuild Android
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build APK (Release)
        working-directory: artifacts/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find and upload APK
        id: find-apk
        run: |
          APK=$(find artifacts/mobile/android -name "*.apk" -type f | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Found APK at: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

  build-android-release:
    name: Build Android Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-android
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install --clean

      - name: Decode Android Keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > artifacts/mobile/android/app/release.keystore
          else
            echo "No keystore provided, building unsigned"
          fi

      - name: Build AAB (Release)
        working-directory: artifacts/mobile/android
        env:
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH || 'release.keystore' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ -n "$KEY_ALIAS" ]; then
            echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
            ./gradlew bundleRelease --no-daemon
          else
            ./gradlew bundleRelease --no-daemon -x signReleaseBundle
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: artifacts/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 90

  build-ios:
    name: Build iOS (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS with EAS
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest build --platform ios --non-interactive --no-wait || echo "EAS iOS build queued - check expo.dev"
